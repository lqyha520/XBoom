execution_instructions: |
  请对「{topic}」进行深度创作，输出完整的Markdown格式文章。
  禁止输出V-SCENE、IMG_PROMPT等图片标记。

global_context_injection: |
  当前系统北京时间：{current_time}。所有回复必须基于此时间点，严禁产生跨时空幻觉。
