<div id="config-api" class="config-panel llm-api-panel">
    <div class="config-header">
        <div class="header-content">
            <div>
                <h2>大模型 API</h2>
                <p class="config-description">选择厂商并配置密钥与模型，各厂商数据独立保存</p>
            </div>
        </div>
        <div class="header-actions">
            <button type="button" class="btn btn-secondary" id="reset-api-config">
                恢复默认
            </button>
            <button type="button" class="btn btn-primary" id="save-api-config">
                保存设置
            </button>
        </div>
    </div>

    <div class="config-form llm-api-config-form">
        <div id="api-provider-toolbar" class="api-provider-toolbar" role="region" aria-label="厂商选择与操作">
            <!-- JS: 厂商选择、状态、操作按钮 -->
        </div>

        <div id="api-providers-container" class="llm-api-detail-wrap">
            <!-- JS: 当前厂商配置表单 -->
        </div>

        <div id="custom-apis-container" class="hidden" aria-hidden="true"></div>

        <details class="llm-api-help-panel">
            <summary>使用说明</summary>
            <div class="llm-api-help-body">
                <ul>
                    <li>通过下拉框切换厂商；每个厂商的 Key、模型<strong>独立保存</strong>。</li>
                    <li>API KEY 支持<strong>一行一个</strong>，系统自动轮换与重试。</li>
                    <li>配置后点击<strong>设为当前使用</strong>，写作才会使用该厂商。</li>
                    <li>修改后请点击右上角<strong>保存设置</strong>写入本地。</li>
                </ul>
            </div>
        </details>
    </div>
</div>
