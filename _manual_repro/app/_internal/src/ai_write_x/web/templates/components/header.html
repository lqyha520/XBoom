<link rel="stylesheet" href="/static/css/components/update-modal.css?v=20260524b">

<!-- 软件更新 -->
<div id="update-modal-overlay" class="update-modal-overlay" style="display: none;">
    <div class="update-modal-card">
        <div class="update-modal-header">
            <div class="update-modal-title-wrap">
                <img class="update-modal-logo" src="/static/images/app-logo.png?v=20260523" alt="小爆来咯">
                <div>
                    <h3 class="update-modal-title">软件更新</h3>
                    <p class="update-modal-subtitle">下载完成后将自动安装并重启</p>
                </div>
            </div>
            <button class="update-close-btn close-btn" type="button" onclick="closeUpdateModal()" aria-label="关闭">&times;</button>
        </div>
        <div class="update-modal-body">
            <div id="update-version-row" class="update-version-row">
                <span class="ver-current">当前 <span id="update-current-version">--</span></span>
                <span class="ver-arrow">→</span>
                <span class="ver-latest" id="update-latest-version">--</span>
            </div>
            <ul id="update-step-list" class="update-step-list"></ul>
            <div id="update-release-notes" class="update-release-notes is-hidden"></div>
            <div id="update-progress-block" class="update-progress-block is-hidden">
                <div class="update-progress-head">
                    <span id="update-progress-label">下载进度</span>
                    <span id="update-progress-percent" class="update-progress-percent">0%</span>
                </div>
                <div class="update-progress-bar">
                    <div id="update-progress-inner" class="update-progress-inner"></div>
                </div>
            </div>
            <div id="update-log-toggle" class="update-log-toggle">▼ 查看详细日志</div>
            <div id="update-log-terminal" class="update-log-terminal"></div>
        </div>
        <div class="update-modal-footer">
            <span id="update-footer-hint" class="update-footer-hint"></span>
            <div class="footer-right update-footer-actions"></div>
        </div>
    </div>
</div>

<script>
    function getAppToken() {
        if (window.APP_CLIENT_TOKEN) return window.APP_CLIENT_TOKEN;
        const name = 'app_client_token=';
        const decodedCookie = decodeURIComponent(document.cookie);
        for (const part of decodedCookie.split(';')) {
            const c = part.trim();
            if (c.indexOf(name) === 0) return c.substring(name.length);
        }
        return '';
    }

    function checkForUpdates() {
        window.updateChecker?.openManualCheck(false);
    }

    function closeUpdateModal() {
        window.updateChecker?.closeModal();
    }

    function copyUpdateLogs() {
        window.updateChecker?.copyLogs();
    }

    function applyUpdate(downloadUrl) {
        window.updateChecker?.startUpdateWithUrl(downloadUrl);
    }

    function executeRestart(exitingAfterRequest = false) {
        window.updateChecker?.restartAndInstall(exitingAfterRequest);
    }

    function showUpdateLogModal() {
        window.updateChecker?.openModal(false);
    }
</script>
