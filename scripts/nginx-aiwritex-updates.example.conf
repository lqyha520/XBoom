# Nginx 示例：将本文件放到服务器后 include 或复制到 sites-enabled
# 假设域名 update.yourdomain.com，证书已配置

server {
    listen 443 ssl http2;
    server_name update.yourdomain.com;

    # ssl_certificate     /path/to/fullchain.pem;
    # ssl_certificate_key /path/to/privkey.pem;

    root /var/www/aiwritex-updates;
    index index.html;

    location /aiwritex/ {
        alias /var/www/aiwritex-updates/;
        autoindex off;

        # 安装包较大，允许断点续传
        add_header Accept-Ranges bytes;

        location ~* \.(exe|json)$ {
            add_header Cache-Control "public, max-age=300";
            add_header Access-Control-Allow-Origin "*";
        }
    }
}

# 对外访问示例:
#   https://update.yourdomain.com/aiwritex/version-policy.json
#   https://update.yourdomain.com/aiwritex/AIWriteX-Setup.exe
# config 中: update_mirror_base: "https://update.yourdomain.com/aiwritex"
