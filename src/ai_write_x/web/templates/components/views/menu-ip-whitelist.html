<div id="menu-ip-whitelist-view" class="view-content" style="display: none;">
    <div class="manager-layout menu-ip-layout">
        <main class="main-wrapper">
            <div class="manager-toolbar">
                <div>
                    <h2 style="margin:0;font-size:20px;">IP 白名单</h2>
                    <p class="text-secondary" style="margin:4px 0 0;font-size:13px;">
                        管理受限菜单可见 IP（工作台、知识库、任务监控、素材中心）。修改后自动刷新本机权限缓存。
                    </p>
                </div>
                <div class="menu-ip-toolbar-actions">
                    <span id="menu-ip-status-badge" class="menu-ip-status-badge">—</span>
                    <button type="button" class="btn btn-secondary" id="menu-ip-refresh-btn"
                        onclick="window.menuIpWhitelistManager.refresh(true)">刷新</button>
                    <button type="button" class="btn btn-primary"
                        onclick="window.menuIpWhitelistManager.openFormModal()">＋ 添加 IP</button>
                </div>
            </div>

            <div id="menu-ip-load-error" class="menu-ip-banner menu-ip-banner-error" style="display:none;"></div>

            <section class="section-card">
                <div class="section-header">
                    <h3>白名单列表</h3>
                    <span id="menu-ip-list-hint" class="text-secondary" style="font-size:12px;"></span>
                </div>
                <div class="table-container">
                    <table class="data-table menu-ip-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>IP 地址</th>
                                <th>备注</th>
                                <th>状态</th>
                                <th>创建时间</th>
                                <th>更新时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="menu-ip-table-body">
                            <tr>
                                <td colspan="7" class="text-center py-5">正在加载…</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="menu-ip-form-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content surface-card" style="max-width: 480px;">
            <div class="modal-header">
                <h3 id="menu-ip-form-title">添加 IP</h3>
                <button type="button" class="modal-close"
                    onclick="window.menuIpWhitelistManager.closeFormModal()">×</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="menu-ip-form-id" value="">
                <div class="form-group">
                    <label>IP 地址 <span class="required">*</span></label>
                    <input type="text" id="menu-ip-form-ip" class="form-control" placeholder="例如 1.2.3.4 或 2001:db8::1"
                        autocomplete="off">
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <input type="text" id="menu-ip-form-remark" class="form-control" placeholder="可选，如：办公室、张三"
                        maxlength="128">
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="menu-ip-form-enabled" checked>
                        <span>启用（enabled=1 时参与菜单可见判断）</span>
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary"
                    onclick="window.menuIpWhitelistManager.closeFormModal()">取消</button>
                <button type="button" class="btn btn-primary" id="menu-ip-form-submit"
                    onclick="window.menuIpWhitelistManager.submitForm()">保存</button>
            </div>
        </div>
    </div>
</div>
