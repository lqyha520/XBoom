[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    -m "not integration and not slow and not network and not ui"
markers =
    unit: fast unit tests suitable for the default local gate
    integration: tests that exercise multiple subsystems or real storage
    slow: long-running tests and performance benchmarks
    network: tests that require external network/API access
    ui: browser, WebView, or frontend rendering tests
    asyncio: async tests executed by pytest-asyncio
